name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Evita el warning de Node 20 en checkout/setup-python (runner → Node 24)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          pytest -v
        continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: ¿Ejecutar migraciones?
        id: migrate
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s' "$COMMIT_MESSAGE" | grep -qF '[migrate]'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script_stop: true

          script: |
            set -e

            echo "Starting deployment..."

            cd /home/app/cerpal_backend

            echo "Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Activating virtual environment..."
            source venv/bin/activate

            echo "Installing dependencies..."
            pip install -r requirements.txt

            echo "Deploy SHA: ${{ github.sha }}"

            if [ "${{ steps.migrate.outputs.run }}" = "true" ]; then
              echo "Running Alembic migrations..."
              alembic upgrade head
            else
              echo "Skipping migrations (añade [migrate] al mensaje del commit para migrar)."
            fi

            echo "Restarting cerpal service..."
            systemctl restart cerpal

            sleep 3

            echo "Checking service status..."
            systemctl is-active cerpal

            echo "Deployment successful"
