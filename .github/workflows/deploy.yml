name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrate:
        description: Ejecutar alembic upgrade head en el servidor
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest -v || true

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: ¿Ejecutar migraciones?
        id: migrate
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          run_migrate=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_migrate }}" = "true" ]; then
            run_migrate=true
          elif printf '%s' "$COMMIT_MESSAGE" | grep -qF '[migrate]'; then
            run_migrate=true
          fi
          if [ "$run_migrate" = "true" ]; then
            echo "run=1" >> "$GITHUB_OUTPUT"
          else
            echo "run=0" >> "$GITHUB_OUTPUT"
          fi
          echo "migrate_flag=$run_migrate"

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          RUN_MIGRATE: ${{ steps.migrate.outputs.run }}

        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script_stop: true
          envs: RUN_MIGRATE
          envs_format: "RUN_MIGRATE"

          script: |
            # Sin set -e: con set -e, un if [ false = true ] puede cortar el script en dash/sh
            echo "Starting deployment..."
            echo "RUN_MIGRATE=${RUN_MIGRATE:-0}"

            cd /home/app/cerpal_backend || exit 1

            echo "Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Activating virtual environment..."
            # shellcheck disable=SC1091
            source venv/bin/activate

            echo "Installing dependencies..."
            pip install -r requirements.txt

            echo "Deploy SHA: ${{ github.sha }}"

            if [ "${RUN_MIGRATE:-0}" = "1" ]; then
              echo "Running Alembic migrations..."
              alembic upgrade head
            else
              echo "Skipping migrations (commit con [migrate] o workflow_dispatch run_migrate=true)."
            fi

            echo "Restarting cerpal service..."
            systemctl restart cerpal

            sleep 3

            echo "Checking service status..."
            systemctl is-active cerpal

            echo "Deployment successful"
