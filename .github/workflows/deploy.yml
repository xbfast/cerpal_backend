name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrate:
        description: Ejecutar alembic upgrade head en el servidor
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest -v || true

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: ¿Ejecutar migraciones?
        id: migrate
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          run_migrate=0
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_migrate }}" = "true" ]; then
            run_migrate=1
          elif printf '%s' "$COMMIT_MESSAGE" | grep -qF '[migrate]'; then
            run_migrate=1
          fi
          echo "run=$run_migrate" >> "$GITHUB_OUTPUT"

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script_stop: true

          script: |
            echo "Starting deployment..."
            RUN_MIGRATE=${{ steps.migrate.outputs.run }}
            echo "RUN_MIGRATE=$RUN_MIGRATE"

            cd /home/app/cerpal_backend || exit 1

            echo "Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Activating virtual environment..."
            . venv/bin/activate

            echo "Installing dependencies..."
            pip install -r requirements.txt

            echo "Deploy SHA: ${{ github.sha }}"

            if [ "$RUN_MIGRATE" = "1" ]; then
              echo "Running Alembic migrations..."
              alembic upgrade head
            else
              echo "Skipping migrations."
            fi

            echo "Restarting cerpal service..."
            systemctl restart cerpal
            sleep 3
            systemctl is-active cerpal
            echo "Deployment successful"
